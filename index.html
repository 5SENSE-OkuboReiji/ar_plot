<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ARモグラ叩き</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    /* カメラ映像を隠さないための最小限のCSS */
    body { margin: 0; overflow: hidden; background-color: #000; }
    
    /* 案内メッセージとボタンをまとめるレイヤー */
    #ui-layer {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10; /* A-Frameより前に出す */
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      pointer-events: none; /* 下のカメラ操作を邪魔しない */
    }

    #scan-message {
      background: rgba(0,0,0,0.6); color: #fff; padding: 10px 20px; border-radius: 5px;
    }

    #start-button {
      display: none; /* 最初は隠す */
      padding: 20px 40px; font-size: 20px; font-weight: bold;
      background: #FFD700; border: none; border-radius: 10px;
      pointer-events: auto; /* ボタンだけはクリック可能にする */
    }

    #score-ui {
      position: fixed; top: 10px; width: 100%; text-align: center;
      color: white; font-size: 24px; z-index: 20; display: none;
    }
  </style>
</head>
<body>

  <div id="score-ui">SCORE: <span id="score-val">0</span></div>

  <div id="ui-layer">
    <div id="scan-message">マーカーを映してください</div>
    <button id="start-button">GAME START</button>
  </div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    vr-mode-ui="enabled: false"
    cursor="rayOrigin: mouse"
    raycaster="objects: .clickable"
  >
    <a-marker preset="hiro" id="marker" emitevents="true">
      <a-sphere
        id="target"
        class="clickable"
        visible="false"
        position="0 0.5 0"
        radius="0.3"
        color="#FF5722"
      ></a-sphere>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const marker = document.getElementById('marker');
    const scanMsg = document.getElementById('scan-message');
    const startBtn = document.getElementById('start-button');
    const scoreUI = document.getElementById('score-ui');
    const target = document.getElementById('target');
    const scoreVal = document.getElementById('score-val');
    
    let score = 0;
    let gameStarted = false;

    // マーカーを見つけた時の処理
    marker.addEventListener('markerFound', () => {
      if (!gameStarted) {
        scanMsg.style.display = 'none';
        startBtn.style.display = 'block';
      }
    });

    // マーカーを見失った時の処理
    marker.addEventListener('markerLost', () => {
      if (!gameStarted) {
        scanMsg.style.display = 'block';
        startBtn.style.display = 'none';
      }
    });

    // ゲーム開始
    startBtn.addEventListener('click', () => {
      gameStarted = true;
      startBtn.style.display = 'none';
      scoreUI.style.display = 'block';
      target.setAttribute('visible', 'true');
    });

    // タップ判定
    target.addEventListener('mousedown', () => {
      if (!gameStarted) return;
      score += 10;
      scoreVal.innerText = score;
      target.setAttribute('visible', 'false');
      setTimeout(() => { if(gameStarted) target.setAttribute('visible', 'true'); }, 600);
    });
  </script>
</body>
</html>
