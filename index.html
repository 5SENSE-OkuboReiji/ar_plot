<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AR Sweet Catch - Precision</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
    
    /* HUD: add horizontal padding to prevent clipping on mobile */
    #hud {
      position: fixed; top: 20px; left: 10%; width: 80%;
      display: none; justify-content: space-between; align-items: center;
      z-index: 1000; pointer-events: none;
    }
    
    .hud-item {
      padding: 10px 20px; border-radius: 30px; font-weight: bold; font-size: 22px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      line-height: 1;
    }
    #score-box { background: #FF69B4; color: white; }
    #time-box { background: rgba(0,0,0,0.6); color: white; border: 2px solid white; }

    #ui {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 2000; display: flex; justify-content: center; align-items: center; pointer-events: none;
    }
    .btn {
      padding: 20px 45px; font-size: 22px; background: #FF69B4; color: #fff;
      border: 4px solid white; border-radius: 50px; pointer-events: auto; font-weight: bold;
    }
    #res-screen {
      display:none; text-align:center; background:rgba(255,255,255,0.98); padding:40px; border-radius:25px;
      width: 70%; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* Countdown overlay */
    #countdown {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      font-size: 120px;
      color: #FF69B4;
      text-shadow: 0 8px 30px rgba(0,0,0,0.6);
      pointer-events: none;
      font-weight: 800;
    }
  </style>
</head>
<body>

  <div id="hud">
    <div id="score-box" class="hud-item">Score: <span id="score">0</span></div>
    <div id="time-box" class="hud-item">Time Left: <span id="time">45</span></div>
  </div>

  <div id="ui">
    <div id="start-screen"><button id="start-btn" class="btn">Start Game</button></div>
    <div id="res-screen">
      <h2 id="res-title" style="color:#FF69B4; font-size: 28px;">Time's up!</h2>
      <p style="font-size:20px;">Points collected</p>
      <p id="final" style="font-size:60px; font-weight:bold; margin: 10px 0; color:#FF69B4;">0</p>
      <button id="retry-btn" class="btn">Play again</button>
    </div>
    <div id="countdown"></div>
  </div>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
    <a-entity id="cam" camera look-controls="touchEnabled: false" position="0 1.6 0"></a-entity>
    <a-entity id="targets"></a-entity>
  </a-scene>

  <script>
    const scoreEl = document.getElementById('score'), timeEl = document.getElementById('time');
    const container = document.getElementById('targets'), scene = document.querySelector('a-scene');

    let score = 0, timeLeft = 45, active = false, timers = [];
    let candyList = [];

    async function init() {
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try { await DeviceOrientationEvent.requestPermission(); } catch(e){}
      }
      start();
    }

    function start() {
      score = 0; timeLeft = 45; active = true;
      scoreEl.innerText = score; timeEl.innerText = timeLeft;
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('res-screen').style.display = 'none';
      document.getElementById('hud').style.display = 'flex';
      
      container.innerHTML = '';
      candyList = [];
      
      spawnLoop('pink', 900);  
      spawnLoop('blue', 4000); 
      spawnLoop('gold', 15000);

      const mainTimer = setInterval(() => {
        timeLeft--; timeEl.innerText = timeLeft;
        if(timeLeft <= 0) endGame(mainTimer);
      }, 1000);
      timers.push(mainTimer);
    }

    function endGame(timer) {
      active = false;
      timers.forEach(t => clearInterval(t));
      timers = [];
      document.getElementById('hud').style.display = 'none';
      const res = document.getElementById('res-screen');
      const title = document.getElementById('res-title');
      const finalEl = document.getElementById('final');
      // show "Finish!" first, then reveal score
      title.innerText = 'Finish!';
      finalEl.innerText = '';
      res.style.display = 'block';
      container.innerHTML = '';
      setTimeout(() => {
        finalEl.innerText = score;
      }, 800);
    }

    function spawnLoop(type, interval) {
      const t = setInterval(() => { if(active) spawn(type); }, interval);
      timers.push(t);
    }

    function spawn(type) {
      const el = document.createElement('a-sphere');
      let config = { color: '#FF69B4', radius: 0.28, pts: 10, life: 7000 };
      if(type === 'blue') config = { color: '#00BFFF', radius: 0.22, pts: 30, life: 5500 };
      if(type === 'gold') config = { color: '#FFD700', radius: 0.18, pts: 100, life: 4000 };

      el.setAttribute('radius', config.radius);
      el.setAttribute('color', config.color);
      el.dataset.pts = config.pts;

      const dist = 3 + Math.random() * 2;
      const theta = Math.random() * Math.PI * 2;
      const phi = (Math.random() - 0.4) * Math.PI * 0.6;
      el.setAttribute('position', `${dist * Math.cos(phi) * Math.cos(theta)} ${1.6 + dist * Math.sin(phi)} ${dist * Math.cos(phi) * Math.sin(theta)}`);
      
      container.appendChild(el);
      candyList.push(el);

      setTimeout(() => {
        if(el.parentNode) {
          el.setAttribute('animation', 'property: scale; to: 0 0 0; dur: 400');
          setTimeout(() => { if(el.parentNode) container.removeChild(el); }, 400);
        }
      }, config.life);
    }

    // Core logic for hit-detection sensitivity
    function handleTap(e) {
      if(!active) return;
      const touch = e.touches ? e.touches[0] : e;
      const camera = scene.camera;
      if(!camera) return;

      let closest = null;
      let minDistance = 75; // hit threshold in pixels (tuned for finger size)

      candyList.forEach(el => {
        if(!el.parentNode || el.getAttribute('scale')?.x === 0) return;

        const pos = new THREE.Vector3();
        el.object3D.getWorldPosition(pos);
        pos.project(camera);

        // Convert 3D world coordinates to 2D screen coordinates
        const x = (pos.x + 1) * window.innerWidth / 2;
        const y = (-pos.y + 1) * window.innerHeight / 2;

        const dist = Math.sqrt(Math.pow(touch.clientX - x, 2) + Math.pow(touch.clientY - y, 2));
        
        // Pick the single closest object within the threshold
        if(dist < minDistance) {
          minDistance = dist;
          closest = el;
        }
      });

      // Process only when a hit occurred (closest one only)
      if(closest) {
        score += parseInt(closest.dataset.pts);
        scoreEl.innerText = score;
        
        // Hit feedback animation
        closest.setAttribute('animation', 'property: scale; to: 2.5 2.5 2.5; dur: 150');
        setTimeout(() => {
          if(closest.parentNode) container.removeChild(closest);
        }, 150);
      }
    }

    // Register input events
    window.addEventListener('touchstart', handleTap, { passive: false });
    window.addEventListener('mousedown', handleTap);
    
    // Countdown + start flow
    const countdownEl = document.getElementById('countdown');
    let countdownRunning = false;
    function startWithCountdown() {
      if (countdownRunning) return;
      countdownRunning = true;
      let n = 3;
      document.getElementById('start-screen').style.display = 'none';
      countdownEl.style.display = 'flex';
      countdownEl.innerText = n;
      const iv = setInterval(() => {
        n--;
        if (n > 0) {
          countdownEl.innerText = n;
        } else {
          clearInterval(iv);
          countdownEl.innerText = 'Start!';
          setTimeout(() => {
            countdownEl.style.display = 'none';
            countdownRunning = false;
            // proceed to permission + start
            init();
          }, 700);
        }
      }, 1000);
    }

    document.getElementById('start-btn').addEventListener('click', startWithCountdown);
    // Retry returns to the start screen (do not auto-start)
    document.getElementById('retry-btn').addEventListener('click', () => {
      // stop any running timers and clear active state
      active = false;
      timers.forEach(t => clearInterval(t));
      timers = [];
      container.innerHTML = '';
      candyList = [];
      score = 0;
      timeLeft = 45;
      scoreEl.innerText = score;
      timeEl.innerText = timeLeft;
      document.getElementById('hud').style.display = 'none';
      document.getElementById('res-screen').style.display = 'none';
      document.getElementById('start-screen').style.display = 'block';
    });
  </script>
</body>
</html>
