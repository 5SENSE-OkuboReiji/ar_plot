<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Candy AR - Final</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
    #hud {
      position: fixed; top: 20px; width: 100%; display: none;
      justify-content: space-around; color: #FF69B4; font-size: 24px; font-weight: bold;
      z-index: 1000; pointer-events: none; text-shadow: 0 0 5px #fff;
    }
    #ui {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 2000; display: flex; justify-content: center; align-items: center; pointer-events: none;
    }
    .btn {
      padding: 20px 40px; font-size: 20px; background: #FF69B4; color: #fff;
      border: none; border-radius: 50px; pointer-events: auto;
    }
  </style>
</head>
<body>

  <div id="hud">
    <div>GET: <span id="score">0</span></div>
    <div>TIME: <span id="time">30</span></div>
  </div>

  <div id="ui">
    <div id="start-screen"><button id="start-btn" class="btn">ゲームをはじめる</button></div>
    <div id="res-screen" style="display:none; text-align:center; background:#fff; padding:30px; border-radius:20px;">
      <h2 style="color:#FF69B4">TIME UP!</h2>
      <p style="font-size:30px">結果: <span id="final">0</span>こ</p>
      <button id="retry-btn" class="btn">もう一回</button>
    </div>
  </div>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
    <a-entity id="cam" camera look-controls="touchEnabled: false" position="0 1.6 0"></a-entity>
    <a-entity id="targets"></a-entity>
  </a-scene>

  <script>
    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('time');
    const container = document.getElementById('targets');
    const scene = document.querySelector('a-scene');

    let score = 0, timeLeft = 30, active = false, timer;
    let candyList = [];

    // 開始処理
    async function init() {
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        await DeviceOrientationEvent.requestPermission();
      }
      start();
    }

    function start() {
      score = 0; timeLeft = 30; active = true;
      scoreEl.innerText = score; timeEl.innerText = timeLeft;
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('res-screen').style.display = 'none';
      document.getElementById('hud').style.display = 'flex';
      
      container.innerHTML = '';
      candyList = [];
      for(let i=0; i<8; i++) spawn();

      timer = setInterval(() => {
        timeLeft--; timeEl.innerText = timeLeft;
        if(timeLeft <= 0) {
          active = false; clearInterval(timer);
          document.getElementById('hud').style.display = 'none';
          document.getElementById('res-screen').style.display = 'block';
          document.getElementById('final').innerText = score;
        }
      }, 1000);
    }

    function spawn() {
      const el = document.createElement('a-sphere');
      el.setAttribute('radius', '0.3');
      el.setAttribute('color', '#FF69B4');
      const r = 3 + Math.random()*2;
      const t = Math.random()*Math.PI*2;
      el.setAttribute('position', `${Math.cos(t)*r} ${1+Math.random()*1.5} ${Math.sin(t)*r}`);
      container.appendChild(el);
      candyList.push(el);
    }

    // ★画面上の「見た目の位置」で判定するロジック
    function handleTap(e) {
      if(!active) return;
      const touch = e.touches ? e.touches[0] : e;
      const tapX = touch.clientX;
      const tapY = touch.clientY;

      const camera = scene.camera;
      if(!camera) return;

      candyList.forEach(el => {
        if(el.getAttribute('visible') === false) return;

        // 3Dの位置を画面の2Dピクセル座標に変換
        const pos = new THREE.Vector3();
        el.object3D.getWorldPosition(pos);
        pos.project(camera);

        const x = (pos.x + 1) * window.innerWidth / 2;
        const y = (-pos.y + 1) * window.innerHeight / 2;

        // タップした場所とお菓子の中心が「100ピクセル以内」ならゲット
        // ※この100を大きくすればもっとガバガバ（簡単）になります
        const dist = Math.sqrt(Math.pow(tapX - x, 2) + Math.pow(tapY - y, 2));
        
        if(dist < 100) { 
          score++; scoreEl.innerText = score;
          el.setAttribute('visible', 'false');
          setTimeout(() => {
            if(active) {
              const r = 3 + Math.random()*2, t = Math.random()*Math.PI*2;
              el.setAttribute('position', `${Math.cos(t)*r} ${1+Math.random()*1.5} ${Math.sin(t)*r}`);
              el.setAttribute('visible', 'true');
            }
          }, 500);
        }
      });
    }

    window.addEventListener('touchstart', handleTap);
    window.addEventListener('mousedown', handleTap);
    document.getElementById('start-btn').addEventListener('click', init);
    document.getElementById('retry-btn').addEventListener('click', start);
  </script>
</body>
</html>
